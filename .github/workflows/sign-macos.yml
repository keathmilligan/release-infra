name: Sign macOS Binaries

on:
  workflow_call:
    inputs:
      binary-name:
        description: Name of the binary
        required: true
        type: string
      targets:
        description: JSON array of macOS target triples to sign
        required: true
        type: string
    secrets:
      APPLE_CERTIFICATE:
        required: false
        description: Base64-encoded .p12 Developer ID Application certificate
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
        description: 'Full signing identity string, e.g. "Developer ID Application: Name (TEAMID)"'
      APPLE_API_ISSUER:
        required: false
        description: App Store Connect API key issuer UUID
      APPLE_API_KEY_ID:
        required: false
        description: App Store Connect API key ID
      APPLE_API_KEY_CONTENT:
        required: false
        description: App Store Connect API key .p8 file content

jobs:
  sign:
    runs-on: macos-latest
    strategy:
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    steps:
      - name: Download unsigned binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: unsigned/

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Write API key file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_CONTENT" > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Codesign binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          chmod +x "unsigned/${{ inputs.binary-name }}"
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "unsigned/${{ inputs.binary-name }}"

      - name: Create ZIP for notarization
        run: |
          cd unsigned
          zip "../${{ inputs.binary-name }}-${{ matrix.target }}.zip" "${{ inputs.binary-name }}"
          cd ..

      - name: Notarize
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          xcrun notarytool submit \
            "${{ inputs.binary-name }}-${{ matrix.target }}.zip" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

      - name: Upload signed binary
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ matrix.target }}
          path: unsigned/${{ inputs.binary-name }}
          if-no-files-found: error
          retention-days: 1
