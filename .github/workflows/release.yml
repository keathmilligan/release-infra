name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: Tag to create (e.g. v1.2.3)
        required: true
        type: string
      force:
        description: Skip version increment validation (use for re-releases)
        required: false
        type: boolean
        default: false
      package-name:
        description: Package name for cargo update
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and prepare release
        id: validate
        env:
          TAG: ${{ inputs.tag }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          # Parse semver string into major minor patch
          parse_semver() {
            local v="$1"
            v="${v#v}"
            if [[ ! "$v" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::Not a valid semver: '$v'"
              exit 1
            fi
            echo "${BASH_REMATCH[1]} ${BASH_REMATCH[2]} ${BASH_REMATCH[3]}"
          }

          # Returns 0 if $2 is a valid single-level increment of $1
          is_valid_increment() {
            local from="$1" to="$2"
            read -r from_maj from_min from_pat <<< "$(parse_semver "$from")"
            read -r to_maj   to_min   to_pat   <<< "$(parse_semver "$to")"

            # major bump
            if (( to_maj == from_maj + 1 && to_min == 0 && to_pat == 0 )); then
              return 0
            fi
            # minor bump (same major)
            if (( to_maj == from_maj && to_min == from_min + 1 && to_pat == 0 )); then
              return 0
            fi
            # patch bump (same major + minor)
            if (( to_maj == from_maj && to_min == from_min && to_pat == from_pat + 1 )); then
              return 0
            fi
            return 1
          }

          # Validate tag format
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be in format 'v1.2.3', got '$TAG'"
            exit 1
          fi

          # Extract version from tag (strip 'v' prefix)
          NEW_VERSION="${TAG#v}"

          # Validate new version is well-formed semver
          parse_semver "$NEW_VERSION" > /dev/null

          # Get current version from Cargo.toml
          CURRENT_VERSION=$(grep -m1 '^version = ' Cargo.toml | grep -oP '"\K[^"]+(?=")')
          if [[ -z "$CURRENT_VERSION" ]]; then
            echo "::error::Could not determine current version from Cargo.toml"
            exit 1
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "New version: $NEW_VERSION"
          echo "Tag: $TAG"

          # Check working tree is clean
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Working tree is not clean. Commit or stash changes first."
            exit 1
          fi

          # Check we're on the default branch (master or main)
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [[ "$CURRENT_BRANCH" != "master" && "$CURRENT_BRANCH" != "main" ]]; then
            echo "::error::Not on default branch (current branch: '$CURRENT_BRANCH')"
            exit 1
          fi

          # Check tag status
          TAG_EXISTS_REMOTE=false
          if git ls-remote --exit-code --tags origin "$TAG" &>/dev/null; then
            TAG_EXISTS_REMOTE=true
          fi

          # Validate version increment
          if [[ "$FORCE" == "true" ]]; then
            echo "Force mode enabled — skipping version increment validation."
          elif [[ "$CURRENT_VERSION" == "$NEW_VERSION" ]] && $TAG_EXISTS_REMOTE; then
            echo "Version matches Cargo.toml and tag exists on remote."
            echo "Treating as a retry — skipping version increment validation."
          elif ! is_valid_increment "$CURRENT_VERSION" "$NEW_VERSION"; then
            echo "::error::$NEW_VERSION is not a valid semver increment of $CURRENT_VERSION. Use --force to bypass."
            exit 1
          fi

          echo "Version increment is valid."

          # Handle existing tag for re-release
          if $TAG_EXISTS_REMOTE; then
            echo "Tag $TAG exists on remote — deleting to allow re-release..."
            git push origin ":refs/tags/$TAG" || true
          fi

          # Delete local tag if it exists
          if git rev-parse "$TAG" &>/dev/null; then
            git tag -d "$TAG"
          fi

          # Output for next steps
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "default_branch=$CURRENT_BRANCH" >> "$GITHUB_OUTPUT"
          echo "needs_bump=$([[ "$CURRENT_VERSION" != "$NEW_VERSION" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml
        if: steps.validate.outputs.needs_bump == 'true'
        env:
          NEW_VERSION: ${{ steps.validate.outputs.new_version }}
        run: |
          # Update version in Cargo.toml (first occurrence in [package] section)
          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"${NEW_VERSION}\"/}" Cargo.toml

          # Verify update
          UPDATED=$(grep -m1 '^version = ' Cargo.toml | grep -oP '"\K[^"]+(?=")')
          if [[ "$UPDATED" != "$NEW_VERSION" ]]; then
            echo "::error::Failed to update version in Cargo.toml (got '$UPDATED')"
            exit 1
          fi
          echo "Updated Cargo.toml to $NEW_VERSION"

      - name: Update Cargo.lock
        if: steps.validate.outputs.needs_bump == 'true'
        env:
          NEW_VERSION: ${{ steps.validate.outputs.new_version }}
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          cargo update -p "$PACKAGE_NAME" --precise "$NEW_VERSION" 2>/dev/null || cargo generate-lockfile
          echo "Updated Cargo.lock"

      - name: Update README badge
        if: steps.validate.outputs.needs_bump == 'true'
        env:
          NEW_VERSION: ${{ steps.validate.outputs.new_version }}
        run: |
          if [[ -f "README.md" ]]; then
            sed -i "s|release\.yml/badge\.svg?branch=v[^)]*|release.yml/badge.svg?branch=v${NEW_VERSION}|g" README.md
            echo "Updated README.md badge reference"
          fi

      - name: Commit version bump
        if: steps.validate.outputs.needs_bump == 'true'
        env:
          NEW_VERSION: ${{ steps.validate.outputs.new_version }}
          DEFAULT_BRANCH: ${{ steps.validate.outputs.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          [[ -f "README.md" ]] && git add README.md
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push origin "$DEFAULT_BRANCH"
          echo "Committed and pushed version bump"

      - name: Create and push tag
        env:
          TAG: ${{ steps.validate.outputs.tag }}
          DEFAULT_BRANCH: ${{ steps.validate.outputs.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo ""
          echo "Done. Tag $TAG pushed — the publish workflow should now be running."
          echo "https://github.com/${{ github.repository }}/actions"
