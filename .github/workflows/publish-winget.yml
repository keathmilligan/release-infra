name: Publish winget Manifest

on:
  workflow_call:
    inputs:
      project-name:
        description: Name of the project
        required: true
        type: string
      version:
        description: Release version (without v prefix)
        required: true
        type: string
      winget-id:
        description: winget package identifier (e.g., publisher.project)
        required: false
        type: string
        default: ""
    secrets:
      WINGET_PAT:
        required: false

jobs:
  publish:
    name: Publish winget
    runs-on: windows-latest
    steps:
      - name: Install wingetcreate
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Determine winget ID
        id: id
        run: |
          $id = if ('${{ inputs.winget-id }}') { '${{ inputs.winget-id }}' } else { "${{ vars.WINGET_ID_PREFIX }}.${{ inputs.project-name }}" }
          echo "winget-id=$id" >> $env:GITHUB_OUTPUT

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $id = "${{ steps.id.outputs.winget-id }}"
          $query = "$id ${{ inputs.version }}"

          # A *merged* PR means this version is already published — nothing to do.
          $merged = gh pr list --repo microsoft/winget-pkgs --state merged --search "$query" --json number,title --limit 5 | ConvertFrom-Json
          $mergedMatch = @($merged) | Where-Object { $_.title -match [regex]::Escape($id) -and $_.title -match [regex]::Escape("${{ inputs.version }}") }
          if ($mergedMatch.Count -gt 0) {
            Write-Host "A merged PR already exists for ${id} ${{ inputs.version }}: $($mergedMatch[0].title) (#$($mergedMatch[0].number)). Skipping."
            echo "skip=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          # An *open* PR is NOT a reason to skip. A previous (possibly cancelled
          # or failed) run may have opened a PR with stale hashes. In that case,
          # update the existing PR branch instead of submitting another PR.
          $open = gh pr list --repo microsoft/winget-pkgs --state open --search "$query" --json number,title --limit 5 | ConvertFrom-Json
          $openMatch = @($open) | Where-Object { $_.title -match [regex]::Escape($id) -and $_.title -match [regex]::Escape("${{ inputs.version }}") }
          if ($openMatch.Count -gt 0) {
            $pr = gh pr view $openMatch[0].number `
              --repo microsoft/winget-pkgs `
              --json number,title,headRefName,headRepository,headRepositoryOwner | ConvertFrom-Json
            $headOwner = $pr.headRepositoryOwner.login
            $headRepoName = $pr.headRepository.name
            $headRepo = $pr.headRepository.nameWithOwner
            if (-not $headRepo -and $headOwner -and $headRepoName) {
              $headRepo = "$headOwner/$headRepoName"
            }
            if (-not $headRepo -or -not $pr.headRefName) {
              Write-Error "Could not resolve head branch for existing PR #$($pr.number)."
              exit 1
            }
            Write-Host "An open PR already exists for ${id} ${{ inputs.version }}: $($pr.title) (#$($pr.number)). Will update ${headRepo}:$($pr.headRefName)."
            echo "open-pr-number=$($pr.number)" >> $env:GITHUB_OUTPUT
            echo "open-pr-head-repo=$headRepo" >> $env:GITHUB_OUTPUT
            echo "open-pr-head-ref=$($pr.headRefName)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No existing PR found for ${id} ${{ inputs.version }}"
          }
          echo "skip=false" >> $env:GITHUB_OUTPUT

      - name: Sync winget-pkgs fork
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          # Determine the fork owner from the PAT
          $owner = (gh api user --jq .login)
          $fork = "$owner/winget-pkgs"
          # Check if the fork exists; if not, wingetcreate will create it
          $exists = gh repo view $fork --json name 2>$null
          if ($exists) {
            Write-Host "Syncing fork $fork with microsoft/winget-pkgs..."
            gh repo sync $fork --source microsoft/winget-pkgs --force
            Write-Host "Fork synced successfully."
          } else {
            Write-Host "Fork $fork does not exist yet; wingetcreate will create it."
          }

      - name: Verify release is published and assets are final
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "v${{ inputs.version }}"

          # Fix 3: ensure the GitHub release exists and is fully published (not a
          # draft). A cancelled/partial run must not be able to submit winget
          # manifests for assets that never became the final release.
          $release = gh release view $tag `
            --repo ${{ github.repository }} `
            --json isDraft,isPrerelease,publishedAt,assets 2>$null | ConvertFrom-Json
          if (-not $release) {
            Write-Error "Release $tag not found for ${{ github.repository }}."
            exit 1
          }
          if ($release.isDraft) {
            Write-Error "Release $tag is still a draft; refusing to submit winget manifest."
            exit 1
          }
          if (-not $release.publishedAt) {
            Write-Error "Release $tag has no publishedAt timestamp; refusing to submit."
            exit 1
          }
          Write-Host "Release $tag is published (publishedAt: $($release.publishedAt))."

          # Ensure the standalone Windows .exe assets and the SHA256SUMS file are all present.
          $required = @(
            "${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.exe",
            "${{ inputs.project-name }}-${{ inputs.version }}-aarch64-pc-windows-msvc.exe",
            "SHA256SUMS"
          )
          $names = $release.assets | ForEach-Object { $_.name }
          foreach ($r in $required) {
            if ($names -notcontains $r) {
              Write-Error "Required release asset '$r' is missing from $tag."
              exit 1
            }
          }
          Write-Host "All required standalone Windows assets and SHA256SUMS are present."

      - name: Verify installer hashes match published SHA256SUMS
        if: steps.check.outputs.skip != 'true'
        run: |
          $ErrorActionPreference = "Stop"
          $base = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}"

          # Fix 1: download the live assets plus the release's own SHA256SUMS and
          # assert the bytes winget will hash match what the release shipped.
          # This catches the case where a cancelled/earlier build produced
          # different bytes than the final published release.
          Invoke-WebRequest -Uri "$base/SHA256SUMS" -OutFile SHA256SUMS

          # Parse "<hash>  <filename>" lines into a lookup table.
          $expected = @{}
          foreach ($line in Get-Content SHA256SUMS) {
            if ($line -match '^\s*([0-9a-fA-F]{64})\s+\*?(.+?)\s*$') {
              $expected[$matches[2]] = $matches[1].ToLower()
            }
          }

          $assets = @(
            "${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.exe",
            "${{ inputs.project-name }}-${{ inputs.version }}-aarch64-pc-windows-msvc.exe"
          )
          foreach ($asset in $assets) {
            if (-not $expected.ContainsKey($asset)) {
              Write-Error "SHA256SUMS does not contain an entry for '$asset'."
              exit 1
            }
            Invoke-WebRequest -Uri "$base/$asset" -OutFile $asset
            $actual = (Get-FileHash -Algorithm SHA256 -Path $asset).Hash.ToLower()
            if ($actual -ne $expected[$asset]) {
              Write-Error "Hash mismatch for '$asset': downloaded=$actual expected(SHA256SUMS)=$($expected[$asset]). Aborting winget submission."
              exit 1
            }
            Write-Host "Verified $asset : $actual"
          }
          Write-Host "All installer hashes match the published SHA256SUMS."

      - name: Submit new manifest PR
        if: steps.check.outputs.skip != 'true'
        run: |
          if ("${{ steps.check.outputs.open-pr-number }}") {
            Write-Host "Existing PR #${{ steps.check.outputs.open-pr-number }} found; skipping new PR submission."
            exit 0
          }

          $x64Url   = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.exe"
          $arm64Url = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${{ inputs.project-name }}-${{ inputs.version }}-aarch64-pc-windows-msvc.exe"
          .\wingetcreate.exe update `
            ${{ steps.id.outputs.winget-id }} `
            --version ${{ inputs.version }} `
            --urls "$x64Url|x64" "$arm64Url|arm64" `
            --prtitle "Update ${{ steps.id.outputs.winget-id }} to ${{ inputs.version }}" `
            --token ${{ secrets.WINGET_PAT }} `
            --submit

      - name: Update existing manifest PR
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.open-pr-number != ''
        env:
          GH_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $ErrorActionPreference = "Stop"
          $id = "${{ steps.id.outputs.winget-id }}"
          $version = "${{ inputs.version }}"
          $x64Url   = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.exe"
          $arm64Url = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${{ inputs.project-name }}-${{ inputs.version }}-aarch64-pc-windows-msvc.exe"

          New-Item -ItemType Directory -Force -Path generated | Out-Null
          .\wingetcreate.exe update `
            $id `
            --version $version `
            --urls "$x64Url|x64" "$arm64Url|arm64" `
            --output generated

          gh repo clone "${{ steps.check.outputs.open-pr-head-repo }}" winget-pkgs -- --branch "${{ steps.check.outputs.open-pr-head-ref }}"

          $segments = $id.Split('.')
          $manifestRoot = Join-Path "winget-pkgs" "manifests"
          $targetDir = Join-Path $manifestRoot $segments[0].Substring(0, 1).ToLower()
          foreach ($segment in $segments) {
            $targetDir = Join-Path $targetDir $segment
          }
          $targetDir = Join-Path $targetDir $version

          if (Test-Path $targetDir) {
            Remove-Item -Recurse -Force $targetDir
          }
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null

          $manifestFiles = Get-ChildItem -Path generated -Recurse -File -Filter "*.yaml"
          if ($manifestFiles.Count -eq 0) {
            Write-Error "wingetcreate did not generate any YAML manifest files."
            exit 1
          }
          foreach ($file in $manifestFiles) {
            Copy-Item $file.FullName -Destination $targetDir -Force
          }

          Push-Location winget-pkgs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "manifests"
          $status = git status --porcelain
          if (-not $status) {
            Write-Host "Existing PR #${{ steps.check.outputs.open-pr-number }} already contains the requested manifest changes."
            Pop-Location
            exit 0
          }
          git commit -m "Update $id to $version"
          git push origin "HEAD:${{ steps.check.outputs.open-pr-head-ref }}"
          Pop-Location
