name: Publish README Badges

on:
  workflow_call:
    inputs:
      project-name:
        description: Name of the project
        required: true
        type: string
      version:
        description: >-
          Release version (without v prefix). When omitted the workflow fetches
          the latest published release tag from the GitHub API automatically.
        required: false
        type: string
        default: ""
      packages-repo:
        description: Packages repository (owner/repo) that hosts badges via GitHub Pages
        required: true
        type: string
      # ─── Distribution channel flags ───────────────────────────────
      enable-homebrew:
        required: false
        type: boolean
        default: false
      enable-scoop:
        required: false
        type: boolean
        default: false
      enable-chocolatey:
        required: false
        type: boolean
        default: false
      enable-winget:
        required: false
        type: boolean
        default: false
      enable-apt:
        required: false
        type: boolean
        default: false
      enable-rpm:
        required: false
        type: boolean
        default: false
      enable-apk:
        required: false
        type: boolean
        default: false
      enable-dmg:
        required: false
        type: boolean
        default: false
      enable-aur:
        required: false
        type: boolean
        default: false
      enable-cargo:
        required: false
        type: boolean
        default: false
      enable-npm:
        required: false
        type: boolean
        default: false
      enable-install-scripts:
        required: false
        type: boolean
        default: false
    secrets:
      PACKAGES_REPO_TOKEN:
        required: false

jobs:
  publish:
    name: Publish README Badges
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version and build channel list
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION:          ${{ inputs.version }}
          ENABLE_DMG:             ${{ inputs.enable-dmg }}
          ENABLE_HOMEBREW:        ${{ inputs.enable-homebrew }}
          ENABLE_SCOOP:           ${{ inputs.enable-scoop }}
          ENABLE_CHOCOLATEY:      ${{ inputs.enable-chocolatey }}
          ENABLE_WINGET:          ${{ inputs.enable-winget }}
          ENABLE_APT:             ${{ inputs.enable-apt }}
          ENABLE_RPM:             ${{ inputs.enable-rpm }}
          ENABLE_APK:             ${{ inputs.enable-apk }}
          ENABLE_AUR:             ${{ inputs.enable-aur }}
          ENABLE_CARGO:           ${{ inputs.enable-cargo }}
          ENABLE_NPM:             ${{ inputs.enable-npm }}
          ENABLE_INSTALL_SCRIPTS: ${{ inputs.enable-install-scripts }}
        run: |
          # ── Resolve version ──────────────────────────────────────────
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "Resolved version from input: $VERSION"
          else
            TAG=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name')
            VERSION="${TAG#v}"
            echo "Auto-detected latest release version: $VERSION (tag: $TAG)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # ── Build enabled-channels JSON array ─────────────────────────
          # Format: [{"file":"macos-dmg","label":"macOS DMG"}, ...]
          CHANNELS="[]"
          add() {
            CHANNELS=$(echo "$CHANNELS" | jq -c \
              --arg f "$1" --arg l "$2" \
              '. + [{"file": $f, "label": $l}]')
          }
          [ "$ENABLE_DMG"             = "true" ] && add "macos-dmg"       "macOS DMG"
          [ "$ENABLE_HOMEBREW"        = "true" ] && add "homebrew"        "Homebrew"
          [ "$ENABLE_SCOOP"           = "true" ] && add "scoop"           "Scoop"
          [ "$ENABLE_CHOCOLATEY"      = "true" ] && add "chocolatey"      "Chocolatey"
          [ "$ENABLE_WINGET"          = "true" ] && add "winget"          "winget"
          [ "$ENABLE_APT"             = "true" ] && add "apt"             "apt"
          [ "$ENABLE_RPM"             = "true" ] && add "rpm"             "rpm"
          [ "$ENABLE_APK"             = "true" ] && add "apk"             "apk"
          [ "$ENABLE_AUR"             = "true" ] && add "aur"             "AUR"
          [ "$ENABLE_CARGO"           = "true" ] && add "crates-io"       "crates.io"
          [ "$ENABLE_NPM"             = "true" ] && add "npm"             "npm"
          [ "$ENABLE_INSTALL_SCRIPTS" = "true" ] && add "install-scripts" "install scripts"

          echo "channels=$CHANNELS" >> "$GITHUB_OUTPUT"
          echo "Enabled channels: $CHANNELS"

      - name: Trigger packages repo badge update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PACKAGES_REPO_TOKEN }}
          repository: ${{ inputs.packages-repo }}
          event-type: update-badges
          client-payload: |
            {
              "project": "${{ inputs.project-name }}",
              "version": "${{ steps.resolve.outputs.version }}",
              "channels": ${{ steps.resolve.outputs.channels }},
              "repo": "${{ github.repository }}",
              "run_id": "${{ github.run_id }}"
            }
