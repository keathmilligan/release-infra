name: Sign Windows Binaries

on:
  workflow_call:
    inputs:
      binary-name:
        description: Name of the binary (without .exe)
        required: true
        type: string
      targets:
        description: JSON array of Windows target triples to sign
        required: true
        type: string
    secrets:
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_SIGNING_ENDPOINT:
        required: false
      AZURE_SIGNING_ACCOUNT:
        required: false
      AZURE_CERT_PROFILE:
        required: false

jobs:
  sign:
    name: Sign Windows / ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    steps:
      - name: Download unsigned binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: unsigned/

      - name: Verify Azure signing secrets
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
        run: |
          missing=()
          [ -z "$AZURE_CLIENT_ID" ]        && missing+=(AZURE_CLIENT_ID)
          [ -z "$AZURE_CLIENT_SECRET" ]    && missing+=(AZURE_CLIENT_SECRET)
          [ -z "$AZURE_TENANT_ID" ]        && missing+=(AZURE_TENANT_ID)
          [ -z "$AZURE_SIGNING_ENDPOINT" ] && missing+=(AZURE_SIGNING_ENDPOINT)
          [ -z "$AZURE_SIGNING_ACCOUNT" ]  && missing+=(AZURE_SIGNING_ACCOUNT)
          [ -z "$AZURE_CERT_PROFILE" ]     && missing+=(AZURE_CERT_PROFILE)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required Azure signing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Sign binary
        uses: Azure/artifact-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\unsigned
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: ${{ inputs.binary-name }}

      - name: Upload signed binary
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ matrix.target }}
          path: unsigned/${{ inputs.binary-name }}.exe
          if-no-files-found: error
          retention-days: 1
