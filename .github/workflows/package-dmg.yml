name: Package macOS DMG

on:
  workflow_call:
    inputs:
      project-name:
        description: Name of the project
        required: true
        type: string
      binary-name:
        description: Name of the binary
        required: true
        type: string
      version:
        description: Release version (without v prefix)
        required: true
        type: string
      targets:
        description: JSON array of macOS target triples
        required: true
        type: string
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
        description: 'Full signing identity string, e.g. "Developer ID Application: Name (TEAMID)"'
      APPLE_API_ISSUER:
        required: false
        description: App Store Connect API key issuer UUID
      APPLE_API_KEY_ID:
        required: false
        description: App Store Connect API key ID
      APPLE_API_KEY_CONTENT:
        required: false
        description: App Store Connect API key .p8 file content

jobs:
  dmg:
    runs-on: macos-latest
    strategy:
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    steps:
      - name: Determine architecture label
        id: arch
        run: |
          if [[ "${{ matrix.target }}" == *"aarch64"* ]]; then
            echo "label=aarch64" >> "$GITHUB_OUTPUT"
          else
            echo "label=x86_64" >> "$GITHUB_OUTPUT"
          fi

      - name: Download signed binary
        uses: actions/download-artifact@v4
        with:
          name: signed-${{ matrix.target }}
          path: binary/

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Write API key file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_CONTENT" > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Create DMG
        run: |
          DMG_NAME="${{ inputs.project-name }}-${{ inputs.version }}-${{ steps.arch.outputs.label }}.dmg"
          DMG_DIR="dmg-contents"

          mkdir -p "$DMG_DIR"
          cp "binary/${{ inputs.binary-name }}" "$DMG_DIR/"
          chmod +x "$DMG_DIR/${{ inputs.binary-name }}"

          hdiutil create -volname "${{ inputs.project-name }}" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Codesign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          DMG_NAME="${{ inputs.project-name }}-${{ inputs.version }}-${{ steps.arch.outputs.label }}.dmg"
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp "$DMG_NAME"

      - name: Notarize DMG
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          DMG_NAME="${{ inputs.project-name }}-${{ inputs.version }}-${{ steps.arch.outputs.label }}.dmg"

          xcrun notarytool submit "$DMG_NAME" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          xcrun stapler staple "$DMG_NAME"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: ${{ inputs.project-name }}-${{ inputs.version }}-${{ steps.arch.outputs.label }}.dmg
          fail_on_unmatched_files: true

      - name: Compute and append SHA256
        run: |
          DMG_NAME="${{ inputs.project-name }}-${{ inputs.version }}-${{ steps.arch.outputs.label }}.dmg"
          sha256sum "$DMG_NAME" >> SHA256SUMS_DMG
          echo "DMG SHA256: $(cat SHA256SUMS_DMG)"

      - name: Upload SHA256 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256-dmg-${{ steps.arch.outputs.label }}
          path: SHA256SUMS_DMG
          retention-days: 1
