name: Package MSI Installer

on:
  workflow_call:
    inputs:
      project-name:
        description: Name of the project
        required: true
        type: string
      binary-name:
        description: Name of the binary
        required: true
        type: string
      version:
        description: Release version (without v prefix)
        required: true
        type: string
    secrets:
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_SIGNING_ACCOUNT:
        required: false
      AZURE_SIGNING_ENDPOINT:
        required: false
      AZURE_CERT_PROFILE:
        required: false

jobs:
  build-msi:
    name: Package MSI
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Download signed Windows binary
        uses: actions/download-artifact@v4
        with:
          name: signed-x86_64-pc-windows-msvc
          path: target/release/

      - name: Build MSI
        run: cargo wix --no-build --nocapture -I dist/wix/main.wxs --install-version ${{ inputs.version }} -o "${{ inputs.project-name }}-${{ inputs.version }}-x86_64.msi"

      - name: Sign MSI
        uses: Azure/artifact-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\${{ inputs.project-name }}-${{ inputs.version }}-x86_64.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: ${{ inputs.project-name }}

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: ${{ inputs.project-name }}-${{ inputs.version }}-x86_64.msi
          fail_on_unmatched_files: true

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-${{ inputs.project-name }}
          path: ${{ inputs.project-name }}-${{ inputs.version }}-x86_64.msi
          retention-days: 1
