name: Publish Chocolatey Package

on:
  workflow_call:
    inputs:
      project-name:
        description: Name of the project
        required: true
        type: string
      version:
        description: Release version (without v prefix)
        required: true
        type: string
    secrets:
      CHOCO_API_KEY:
        required: false

jobs:
  publish:
    name: Publish Chocolatey
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ZIP from GitHub release
        run: |
          $zipUrl = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Force -Path zip | Out-Null
          Invoke-WebRequest -Uri $zipUrl -OutFile "zip/${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.zip"
          
      - name: Compute ZIP SHA256
        id: checksum
        run: |
          $zipPath = "zip/${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.zip"
          $sha256 = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash
          echo "sha256=$sha256" >> "$env:GITHUB_OUTPUT"

      - name: Update nuspec version
        run: |
          $nuspec = Get-Content "dist/chocolatey/package.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*</version>', "<version>${{ inputs.version }}</version>"
          Set-Content "dist/chocolatey/package.nuspec" $nuspec

      - name: Update install script URLs and checksum
        run: |
          $zipUrl = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${{ inputs.project-name }}-${{ inputs.version }}-x86_64-pc-windows-msvc.zip"
          $sha256 = "${{ steps.checksum.outputs.sha256 }}"
          $install = Get-Content "dist/chocolatey/tools/chocolateyInstall.ps1" -Raw
          $install = $install -replace '\$url\s*=.*', "`$url = '$zipUrl'"
          $install = $install -replace '__SHA256_ZIP__', $sha256
          Set-Content "dist/chocolatey/tools/chocolateyInstall.ps1" $install

      - name: Build nupkg
        run: |
          choco pack "dist/chocolatey/package.nuspec" --output-directory .

      - name: Push to Chocolatey
        run: |
          $nupkg = (Get-Item *.nupkg).FullName
          $output = choco push $nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }} 2>&1
          $exitCode = $LASTEXITCODE
          
          # Check if version already exists (non-fatal)
          if ($output -match 'already exists' -or $output -match 'A package with this ID and version') {
            Write-Host "::warning::Package version already exists on Chocolatey (non-fatal)"
            exit 0
          }
          
          if ($exitCode -ne 0) {
            Write-Error "Chocolatey push failed: $output"
            exit $exitCode
          }
