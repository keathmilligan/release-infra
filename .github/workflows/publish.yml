name: Publish Orchestrator

on:
  workflow_call:
    inputs:
      project-name:
        description: Name of the project
        required: true
        type: string
      binary-name:
        description: Name of the binary
        required: true
        type: string
      project-type:
        description: "Project type: rust, go, or node"
        required: true
        type: string
        default: rust
      tag:
        description: Tag to publish (e.g. v1.2.3). If omitted, extracted from GITHUB_REF (tag push trigger).
        required: false
        type: string
        default: ""
      ref:
        description: >-
          Exact git ref/SHA to check out and build from. Prefer passing the
          immutable commit SHA produced by the release job (release_sha) so that
          re-tagging a release cannot cause stale bytes to be built or published.
          Falls back to the tag, then the triggering ref.
        required: false
        type: string
        default: ""
      targets:
        description: Comma-separated list of Rust target triples
        required: true
        type: string
      node-version:
        description: Node.js version (for node projects)
        required: false
        type: string
        default: "20"
      go-version:
        description: Go version (for go projects)
        required: false
        type: string
        default: "stable"
      go-main-package:
        description: Package path to build for go projects (e.g. "." or "./cmd/app")
        required: false
        type: string
        default: "."
      go-version-var:
        description: Fully-qualified variable to receive the version via -ldflags -X (go projects)
        required: false
        type: string
        default: "main.version"
      # ─── Distribution repo references ──────────────────────────────
      tap-repo:
        description: Homebrew tap repository (owner/repo)
        required: false
        type: string
        default: ""
      bucket-repo:
        description: Scoop bucket repository (owner/repo)
        required: false
        type: string
        default: ""
      packages-repo:
        description: Packages repository for apt/rpm (owner/repo)
        required: false
        type: string
        default: ""
      # ─── Enable flags ──────────────────────────────────────────────
      enable-homebrew:
        required: false
        type: boolean
        default: false
      enable-scoop:
        required: false
        type: boolean
        default: false
      enable-chocolatey:
        required: false
        type: boolean
        default: false
      enable-winget:
        required: false
        type: boolean
        default: false
      enable-apt:
        required: false
        type: boolean
        default: false
      enable-rpm:
        required: false
        type: boolean
        default: false
      enable-apk:
        required: false
        type: boolean
        default: false
      enable-dmg:
        required: false
        type: boolean
        default: false
      enable-aur:
        required: false
        type: boolean
        default: false
      enable-cargo:
        required: false
        type: boolean
        default: false
      enable-msi:
        required: false
        type: boolean
        default: false
      enable-install-scripts:
        required: false
        type: boolean
        default: false
      # ─── README badge publishing ───────────────────────────────────
      enable-badges:
        description: Generate per-channel badge SVGs and publish them to the packages repo
        required: false
        type: boolean
        default: false
      cargo-alt-name:
        description: Alternative crate name for crates.io (if name is taken)
        required: false
        type: string
        default: ""
      npm-alt-name:
        description: Alternative package name for npm (if name is taken)
        required: false
        type: string
        default: ""
      homebrew-alt-name:
        description: Alternative formula name for Homebrew (if name is taken)
        required: false
        type: string
        default: ""
      chocolatey-alt-name:
        description: Alternative package name for Chocolatey (if name is taken)
        required: false
        type: string
        default: ""
      scoop-alt-name:
        description: Alternative manifest name for Scoop (if name is taken)
        required: false
        type: string
        default: ""
      apt-alt-name:
        description: Alternative package name for apt repo (if name is taken)
        required: false
        type: string
        default: ""
      rpm-alt-name:
        description: Alternative package name for rpm repo (if name is taken)
        required: false
        type: string
        default: ""

jobs:
  # ─── Version extraction and validation ───────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      has-macos-targets: ${{ steps.targets.outputs.has-macos }}
      has-windows-targets: ${{ steps.targets.outputs.has-windows }}
      has-linux-targets: ${{ steps.targets.outputs.has-linux }}
      macos-targets-json: ${{ steps.targets.outputs.macos-json }}
      windows-targets-json: ${{ steps.targets.outputs.windows-json }}
      linux-targets-json: ${{ steps.targets.outputs.linux-json }}
      all-targets-json: ${{ steps.targets.outputs.all-json }}
      target-matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || (inputs.tag != '' && inputs.tag || github.ref) }}
          # Fetch full history + tags so the version can be recovered from the
          # checked-out commit via `git describe` when no explicit tag input is
          # provided (e.g. chained release -> publish workflow_dispatch runs
          # where GITHUB_REF is a branch ref, not a tag).
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          # Resolve the tag from, in order of preference:
          #   1. The explicit `tag` input (best — pass needs.release.outputs.tag).
          #   2. GITHUB_REF when it is a tag ref (tag-push trigger model).
          #   3. An exact tag pointing at the checked-out commit (chained model
          #      where `ref` is the release SHA but `tag` was not forwarded).
          if [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
            echo "Using tag from input: $TAG"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Using tag from GITHUB_REF: $TAG"
          else
            # Recover an exact semver tag at HEAD.
            TAG="$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
            if [[ -n "$TAG" ]]; then
              echo "Recovered tag from HEAD: $TAG"
            fi
          fi

          if [[ -z "$TAG" ]]; then
            echo "::error::Could not determine the release tag. Pass the 'tag' input to publish.yml (e.g. tag: \${{ needs.release.outputs.tag }}), trigger on a tag push, or check out a commit that an exact vX.Y.Z tag points to. GITHUB_REF was '$GITHUB_REF'."
            exit 1
          fi

          VERSION="${TAG#v}"

          # Fail fast on a malformed version. Without this, a bad value (such as
          # a branch ref like 'refs/heads/master') silently poisons every
          # downstream archive name and breaks packaging in confusing ways.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Resolved version '$VERSION' (from tag '$TAG') is not valid semver (expected X.Y.Z). Ensure the release tag is in the form 'vX.Y.Z' and that the 'tag' input is forwarded from the release job."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION from tag: $TAG"

      - name: Validate Cargo.toml version
        if: inputs.project-type == 'rust'
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi

      - name: Parse targets
        id: targets
        run: |
          IFS=',' read -ra TARGETS <<< "${{ inputs.targets }}"

          MACOS=()
          WINDOWS=()
          LINUX=()
          MATRIX='[]'

          for t in "${TARGETS[@]}"; do
            t=$(echo "$t" | xargs)  # trim whitespace
            if [[ "$t" == *"apple-darwin"* ]]; then
              MACOS+=("\"$t\"")
              MATRIX=$(echo "$MATRIX" | jq -c --arg t "$t" '. + [{"target": $t, "runner": "macos-latest", "use-cross": false}]')
            elif [[ "$t" == *"windows"* ]]; then
              WINDOWS+=("\"$t\"")
              MATRIX=$(echo "$MATRIX" | jq -c --arg t "$t" '. + [{"target": $t, "runner": "windows-latest", "use-cross": false}]')
            elif [[ "$t" == *"linux"* ]]; then
              LINUX+=("\"$t\"")
              USE_CROSS="false"
              if [[ "$t" == *"aarch64"* ]] || [[ "$t" == *"musl"* ]]; then
                USE_CROSS="true"
              fi
              MATRIX=$(echo "$MATRIX" | jq -c --arg t "$t" --argjson cross "$USE_CROSS" '. + [{"target": $t, "runner": "ubuntu-latest", "use-cross": $cross}]')
            fi
          done

          echo "has-macos=$( [ ${#MACOS[@]} -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has-windows=$( [ ${#WINDOWS[@]} -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has-linux=$( [ ${#LINUX[@]} -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "macos-json=[$(IFS=,; echo "${MACOS[*]}")]" >> "$GITHUB_OUTPUT"
          echo "windows-json=[$(IFS=,; echo "${WINDOWS[*]}")]" >> "$GITHUB_OUTPUT"
          echo "linux-json=[$(IFS=,; echo "${LINUX[*]}")]" >> "$GITHUB_OUTPUT"

          ALL=("${MACOS[@]}" "${WINDOWS[@]}" "${LINUX[@]}")
          echo "all-json=[$(IFS=,; echo "${ALL[*]}")]" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ─── Build ───────────────────────────────────────────────────────
  build-rust:
    needs: prepare
    if: inputs.project-type == 'rust'
    uses: ./.github/workflows/build-rust.yml
    with:
      ref: ${{ inputs.ref != '' && inputs.ref || (inputs.tag != '' && inputs.tag || github.ref) }}
      binary-name: ${{ inputs.binary-name }}
      targets: ${{ inputs.targets }}
      _target-matrix: ${{ needs.prepare.outputs.target-matrix }}

  build-go:
    needs: prepare
    if: inputs.project-type == 'go'
    uses: ./.github/workflows/build-go.yml
    with:
      ref: ${{ inputs.ref != '' && inputs.ref || (inputs.tag != '' && inputs.tag || github.ref) }}
      binary-name: ${{ inputs.binary-name }}
      targets: ${{ inputs.targets }}
      version: ${{ needs.prepare.outputs.version }}
      go-version: ${{ inputs.go-version }}
      main-package: ${{ inputs.go-main-package }}
      version-var: ${{ inputs.go-version-var }}
      _target-matrix: ${{ needs.prepare.outputs.target-matrix }}

  build-node:
    needs: prepare
    if: inputs.project-type == 'node'
    uses: ./.github/workflows/build-node.yml
    with:
      ref: ${{ inputs.ref != '' && inputs.ref || (inputs.tag != '' && inputs.tag || github.ref) }}
      project-name: ${{ inputs.project-name }}
      node-version: ${{ inputs.node-version }}

  # ─── Sign ────────────────────────────────────────────────────────
  sign-windows:
    needs: [prepare, build-rust, build-go]
    if: |
      always() &&
      (needs.build-rust.result == 'success' || needs.build-go.result == 'success') &&
      needs.prepare.outputs.has-windows-targets == 'true'
    uses: ./.github/workflows/sign-windows.yml
    with:
      binary-name: ${{ inputs.binary-name }}
      targets: ${{ needs.prepare.outputs.windows-targets-json }}
    secrets: inherit

  sign-macos:
    needs: [prepare, build-rust, build-go]
    if: |
      always() &&
      (needs.build-rust.result == 'success' || needs.build-go.result == 'success') &&
      needs.prepare.outputs.has-macos-targets == 'true'
    uses: ./.github/workflows/sign-macos.yml
    with:
      binary-name: ${{ inputs.binary-name }}
      targets: ${{ needs.prepare.outputs.macos-targets-json }}
    secrets: inherit

  # ─── Release ─────────────────────────────────────────────────────
  release:
    needs: [prepare, build-rust, build-go, sign-windows, sign-macos]
    if: |
      always() &&
      (needs.build-rust.result == 'success' || needs.build-go.result == 'success') &&
      (needs.sign-windows.result == 'success' || needs.sign-windows.result == 'skipped') &&
      (needs.sign-macos.result == 'success' || needs.sign-macos.result == 'skipped')
    permissions:
      contents: write
    uses: ./.github/workflows/release-github.yml
    with:
      project-name: ${{ inputs.project-name }}
      binary-name: ${{ inputs.binary-name }}
      version: ${{ needs.prepare.outputs.version }}
      targets: ${{ needs.prepare.outputs.all-targets-json }}

  # ─── Publish: cargo / npm ────────────────────────────────────────
  publish-cargo:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-cargo == true
    uses: ./.github/workflows/publish-cargo.yml
    with:
      ref: ${{ inputs.ref != '' && inputs.ref || (inputs.tag != '' && inputs.tag || github.ref) }}
      cargo-alt-name: ${{ inputs.cargo-alt-name }}
    secrets: inherit

  publish-npm:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.project-type == 'node'
    uses: ./.github/workflows/publish-npm.yml
    with:
      npm-alt-name: ${{ inputs.npm-alt-name }}
    secrets: inherit

  # ─── Publish: Homebrew ───────────────────────────────────────────
  publish-homebrew:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-homebrew == true
    uses: ./.github/workflows/publish-homebrew.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
      targets: ${{ needs.prepare.outputs.all-targets-json }}
      tap-repo: ${{ inputs.tap-repo }}
      homebrew-alt-name: ${{ inputs.homebrew-alt-name }}
    secrets: inherit

  # ─── Publish: Scoop ──────────────────────────────────────────────
  publish-scoop:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-scoop == true
    uses: ./.github/workflows/publish-scoop.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
      bucket-repo: ${{ inputs.bucket-repo }}
      scoop-alt-name: ${{ inputs.scoop-alt-name }}
    secrets: inherit

  # ─── Package: MSI ────────────────────────────────────────────────
  package-msi:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-msi == true
    uses: ./.github/workflows/package-msi.yml
    with:
      project-name: ${{ inputs.project-name }}
      binary-name: ${{ inputs.binary-name }}
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  # ─── Publish: Chocolatey ─────────────────────────────────────────
  publish-chocolatey:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-chocolatey == true
    uses: ./.github/workflows/publish-chocolatey.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
      chocolatey-alt-name: ${{ inputs.chocolatey-alt-name }}
    secrets: inherit

  # ─── Publish: winget ─────────────────────────────────────────────
  # winget uses portable .exe installers uploaded directly to the GitHub
  # release — no MSI required. A symlink is created automatically by winget
  # in %LOCALAPPDATA%\Microsoft\WinGet\Links\ (user) or
  # C:\Program Files\WinGet\Links\ (machine) using the Commands field
  # already present in the winget-pkgs manifest.
  publish-winget:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-winget == true
    uses: ./.github/workflows/publish-winget.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  # ─── Package: DMG ────────────────────────────────────────────────
  package-dmg:
    needs: [prepare, sign-macos]
    if: |
      !cancelled() &&
      needs.sign-macos.result == 'success' &&
      inputs.enable-dmg == true
    uses: ./.github/workflows/package-dmg.yml
    with:
      project-name: ${{ inputs.project-name }}
      binary-name: ${{ inputs.binary-name }}
      version: ${{ needs.prepare.outputs.version }}
      targets: ${{ needs.prepare.outputs.macos-targets-json }}
    secrets: inherit

  # ─── Package: Linux (deb/rpm/apk) ───────────────────────────────
  package-linux:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      (inputs.enable-apt == true || inputs.enable-rpm == true || inputs.enable-apk == true)
    uses: ./.github/workflows/package-linux.yml
    with:
      project-name: ${{ inputs.project-name }}
      binary-name: ${{ inputs.binary-name }}
      version: ${{ needs.prepare.outputs.version }}
      targets: ${{ needs.prepare.outputs.linux-targets-json }}
      enable-apt: ${{ inputs.enable-apt }}
      enable-rpm: ${{ inputs.enable-rpm }}
      enable-apk: ${{ inputs.enable-apk }}

  # ─── Publish: apt ────────────────────────────────────────────────
  publish-apt:
    needs: [prepare, package-linux]
    if: |
      !cancelled() &&
      needs.package-linux.result == 'success' &&
      inputs.enable-apt == true
    uses: ./.github/workflows/publish-apt.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
      packages-repo: ${{ inputs.packages-repo }}
      apt-alt-name: ${{ inputs.apt-alt-name }}
    secrets: inherit

  # ─── Publish: rpm ────────────────────────────────────────────────
  publish-rpm:
    needs: [prepare, package-linux]
    if: |
      !cancelled() &&
      needs.package-linux.result == 'success' &&
      inputs.enable-rpm == true
    uses: ./.github/workflows/publish-rpm.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
      packages-repo: ${{ inputs.packages-repo }}
      rpm-alt-name: ${{ inputs.rpm-alt-name }}
    secrets: inherit

  # ─── Publish: AUR ────────────────────────────────────────────────
  publish-aur:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-aur == true
    uses: ./.github/workflows/publish-aur.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  # ─── Publish: Install scripts ────────────────────────────────────
  publish-install-scripts:
    needs: [prepare, release]
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-install-scripts == true
    uses: ./.github/workflows/publish-install-scripts.yml
    with:
      project-name: ${{ inputs.project-name }}
      binary-name: ${{ inputs.binary-name }}
      version: ${{ needs.prepare.outputs.version }}
      packages-repo: ${{ inputs.packages-repo }}
    secrets: inherit

  # ─── Publish per-channel badge SVGs ─────────────────────────────
  # Badges must run AFTER all packaging/publish jobs so that release
  # assets (DMG, MSI, deb, rpm, install scripts) are already uploaded
  # when the badge generator checks for them.
  publish-badges:
    needs:
      - prepare
      - release
      - package-dmg
      - package-msi
      - package-linux
      - publish-apt
      - publish-rpm
      - publish-cargo
      - publish-npm
      - publish-homebrew
      - publish-scoop
      - publish-chocolatey
      - publish-winget
      - publish-aur
      - publish-install-scripts
    if: |
      !cancelled() &&
      needs.release.result == 'success' &&
      inputs.enable-badges == true
    uses: ./.github/workflows/publish-badges.yml
    with:
      project-name: ${{ inputs.project-name }}
      version: ${{ needs.prepare.outputs.version }}
      packages-repo: ${{ inputs.packages-repo }}
      enable-homebrew: ${{ inputs.enable-homebrew }}
      enable-scoop: ${{ inputs.enable-scoop }}
      enable-chocolatey: ${{ inputs.enable-chocolatey }}
      enable-winget: ${{ inputs.enable-winget }}
      enable-apt: ${{ inputs.enable-apt }}
      enable-rpm: ${{ inputs.enable-rpm }}
      enable-apk: ${{ inputs.enable-apk }}
      enable-dmg: ${{ inputs.enable-dmg }}
      enable-msi: ${{ inputs.enable-msi }}
      enable-aur: ${{ inputs.enable-aur }}
      enable-cargo: ${{ inputs.enable-cargo }}
      enable-npm: ${{ inputs.enable-npm || inputs.project-type == 'node' }}
      enable-install-scripts: ${{ inputs.enable-install-scripts }}
    secrets: inherit
