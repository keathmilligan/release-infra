name: Generate README Badges

on:
  workflow_call:
    inputs:
      repo-owner:
        description: GitHub repository owner (org or user)
        required: true
        type: string
      repo-name:
        description: GitHub repository name
        required: true
        type: string
      project-name:
        description: Project name used in badge labels
        required: true
        type: string
      ci-workflow-filename:
        description: Filename of the project CI workflow
        required: false
        type: string
        default: "ci.yml"
      release-workflow-filename:
        description: Filename of the caller release workflow
        required: false
        type: string
        default: "release.yml"
      templates-repo:
        description: Repository containing badge templates (owner/repo)
        required: false
        type: string
        default: "keathmilligan/release-infra"
      # ─── Distribution channel flags ───────────────────────────────
      enable-homebrew:
        required: false
        type: boolean
        default: false
      enable-scoop:
        required: false
        type: boolean
        default: false
      enable-chocolatey:
        required: false
        type: boolean
        default: false
      enable-winget:
        required: false
        type: boolean
        default: false
      enable-apt:
        required: false
        type: boolean
        default: false
      enable-rpm:
        required: false
        type: boolean
        default: false
      enable-apk:
        required: false
        type: boolean
        default: false
      enable-dmg:
        required: false
        type: boolean
        default: false
      enable-aur:
        required: false
        type: boolean
        default: false
      enable-cargo:
        required: false
        type: boolean
        default: false
      enable-npm:
        required: false
        type: boolean
        default: false
      enable-install-scripts:
        required: false
        type: boolean
        default: false
    outputs:
      badges-markdown:
        description: Rendered Markdown badge block
        value: ${{ jobs.generate.outputs.badges-markdown }}

jobs:
  generate:
    name: Generate README Badges
    runs-on: ubuntu-latest
    outputs:
      badges-markdown: ${{ steps.render.outputs.badges-markdown }}
    steps:
      - name: Checkout release-infra (for templates)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.templates-repo }}
          path: release-infra

      - name: Render badge block
        id: render
        env:
          REPO_OWNER: ${{ inputs.repo-owner }}
          REPO_NAME: ${{ inputs.repo-name }}
          PROJECT_NAME: ${{ inputs.project-name }}
          CI_WORKFLOW_FILENAME: ${{ inputs.ci-workflow-filename }}
          RELEASE_WORKFLOW_FILENAME: ${{ inputs.release-workflow-filename }}
          ENABLE_HOMEBREW: ${{ inputs.enable-homebrew }}
          ENABLE_SCOOP: ${{ inputs.enable-scoop }}
          ENABLE_CHOCOLATEY: ${{ inputs.enable-chocolatey }}
          ENABLE_WINGET: ${{ inputs.enable-winget }}
          ENABLE_APT: ${{ inputs.enable-apt }}
          ENABLE_RPM: ${{ inputs.enable-rpm }}
          ENABLE_APK: ${{ inputs.enable-apk }}
          ENABLE_DMG: ${{ inputs.enable-dmg }}
          ENABLE_AUR: ${{ inputs.enable-aur }}
          ENABLE_CARGO: ${{ inputs.enable-cargo }}
          ENABLE_NPM: ${{ inputs.enable-npm }}
          ENABLE_INSTALL_SCRIPTS: ${{ inputs.enable-install-scripts }}
        run: |
          BASE="https://github.com/${REPO_OWNER}/${REPO_NAME}"
          REL_WF="${RELEASE_WORKFLOW_FILENAME}"

          # Build conditional channel badge lines
          CHANNEL_BADGES=""

          add_badge() {
            local label="$1"
            local wf="$2"
            local url="${BASE}/actions/workflows/${wf}"
            CHANNEL_BADGES="${CHANNEL_BADGES}[![${label}](${url}/badge.svg)](${url})"$'\n'
          }

          [ "$ENABLE_DMG"             = "true" ] && add_badge "macOS DMG"        "$REL_WF"
          [ "$ENABLE_HOMEBREW"        = "true" ] && add_badge "Homebrew"          "$REL_WF"
          [ "$ENABLE_SCOOP"           = "true" ] && add_badge "Scoop"             "$REL_WF"
          [ "$ENABLE_CHOCOLATEY"      = "true" ] && add_badge "Chocolatey"        "$REL_WF"
          [ "$ENABLE_WINGET"          = "true" ] && add_badge "winget"            "$REL_WF"
          [ "$ENABLE_APT"             = "true" ] && add_badge "apt"               "$REL_WF"
          [ "$ENABLE_RPM"             = "true" ] && add_badge "rpm"               "$REL_WF"
          [ "$ENABLE_APK"             = "true" ] && add_badge "apk"               "$REL_WF"
          [ "$ENABLE_AUR"             = "true" ] && add_badge "AUR"               "$REL_WF"
          [ "$ENABLE_CARGO"           = "true" ] && add_badge "crates.io"         "$REL_WF"
          [ "$ENABLE_NPM"             = "true" ] && add_badge "npm"               "$REL_WF"
          [ "$ENABLE_INSTALL_SCRIPTS" = "true" ] && add_badge "Install Scripts"   "$REL_WF"

          # Strip trailing newline from channel badges block
          CHANNEL_BADGES="${CHANNEL_BADGES%$'\n'}"

          # Render template: substitute static vars, then inject channel block
          RENDERED=$(sed \
            -e "s|{{REPO_OWNER}}|${REPO_OWNER}|g" \
            -e "s|{{REPO_NAME}}|${REPO_NAME}|g" \
            -e "s|{{PROJECT_NAME}}|${PROJECT_NAME}|g" \
            -e "s|{{CI_WORKFLOW_FILENAME}}|${CI_WORKFLOW_FILENAME}|g" \
            -e "s|{{RELEASE_WORKFLOW_FILENAME}}|${RELEASE_WORKFLOW_FILENAME}|g" \
            release-infra/templates/badges.md.tmpl)

          # Replace {{CHANNEL_BADGES}} placeholder with the built channel block.
          # Use awk to handle multi-line replacement safely.
          RENDERED=$(echo "$RENDERED" | awk -v repl="$CHANNEL_BADGES" '{
            if ($0 == "{{CHANNEL_BADGES}}") {
              if (repl != "") printf "%s\n", repl
            } else {
              print
            }
          }')

          # Write to step summary
          echo "$RENDERED" >> "$GITHUB_STEP_SUMMARY"

          # Expose as job output (escape newlines for GITHUB_OUTPUT multiline syntax)
          {
            echo "badges-markdown<<BADGES_EOF"
            echo "$RENDERED"
            echo "BADGES_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Badge block generated successfully."
          echo "---"
          echo "$RENDERED"
