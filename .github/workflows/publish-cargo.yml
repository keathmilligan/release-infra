name: Publish to crates.io

on:
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Extract crate name and version from Cargo.toml
          CRATE_NAME=$(grep -m1 '^name = ' Cargo.toml | grep -oP '"\K[^"]+(?=")')
          CRATE_VERSION=$(grep -m1 '^version = ' Cargo.toml | grep -oP '"\K[^"]+(?=")')
          
          echo "Publishing $CRATE_NAME v$CRATE_VERSION"
          
          # Check if this version already exists on crates.io
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://crates.io/api/v1/crates/$CRATE_NAME/$CRATE_VERSION" 2>/dev/null || echo "000")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "::warning::Version $CRATE_VERSION of $CRATE_NAME is already published on crates.io. Skipping publish."
            exit 0
          fi
          
          # Publish the crate
          cargo publish --token "$CARGO_REGISTRY_TOKEN"
