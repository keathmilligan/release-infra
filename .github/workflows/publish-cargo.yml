name: Publish to crates.io

on:
  workflow_call:
    inputs:
      cargo-alt-name:
        description: Alternative crate name for crates.io (if name is taken)
        required: false
        type: string
        default: ""
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

jobs:
  publish:
    name: Publish Cargo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Apply alternative crate name
        if: inputs.cargo-alt-name != ''
        run: |
          ALT_NAME="${{ inputs.cargo-alt-name }}"
          echo "Replacing crate name with: $ALT_NAME"
          sed -i -E "s/^name = \"[^\"]+\"/name = \"$ALT_NAME\"/" Cargo.toml

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Extract crate name and version from Cargo.toml
          CRATE_NAME=$(grep -m1 '^name = ' Cargo.toml | grep -oP '"\K[^"]+(?=")' | tr -d '\n\r')
          CRATE_VERSION=$(grep -m1 '^version = ' Cargo.toml | grep -oP '"\K[^"]+(?=")' | tr -d '\n\r')
          
          echo "Publishing $CRATE_NAME v$CRATE_VERSION"
          
          # Check if this version already exists on crates.io
          # A User-Agent header is required by crates.io crawler policy; omitting it returns 403.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: publish-cargo-workflow/1.0 (github-actions)" \
            "https://crates.io/api/v1/crates/$CRATE_NAME/$CRATE_VERSION" 2>/dev/null || echo "000")
          
          echo "Crates.io API response status: $HTTP_STATUS"
          
          # 200: version exists; skip. 404: version does not exist yet; publish.
          # Any other status (e.g. 5xx) falls through so cargo publish can surface the real error.
          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "::warning::Version $CRATE_VERSION of $CRATE_NAME already exists on crates.io. Skipping publish."
            exit 0
          fi
          
          # Publish the crate
          # --allow-dirty: the CI checkout is clean (from a tag) but cargo's
          # own index update can regenerate Cargo.lock, tripping the dirty
          # working-directory check.  Safe because crates.io ignores lockfiles.
          cargo publish --token "$CARGO_REGISTRY_TOKEN" --allow-dirty
